name: Build Debug APK

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Tag from prjctimg/learn-p5 to build'
        required: false

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.resolve.outputs.tag }}
      should_build: ${{ steps.resolve.outputs.should_build }}
    steps:
      - name: Resolve tag to build
        id: resolve
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ -n "${{ inputs.release_tag }}" ]; then
            TAG="${{ inputs.release_tag }}"
          else
            TAG=$(gh api repos/prjctimg/learn-p5/releases/latest --jq '.tag_name' 2>/dev/null || echo "")
          fi

          if [ -z "$TAG" ]; then
            echo "should_build=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if gh release view "debug-$TAG" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            echo "should_build=false" >> "$GITHUB_OUTPUT"
          else
            echo "should_build=true" >> "$GITHUB_OUTPUT"
            echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: check
    if: needs.check.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout prjctimg/learn-p5 at ${{ needs.check.outputs.tag }}
        run: |
          git clone --depth 1 --branch "${{ needs.check.outputs.tag }}" \
            https://github.com/prjctimg/learn-p5.git .

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: android-actions/setup-android@v3

      - name: Prebuild native project
        run: npx expo prebuild --platform android --clean

      - name: Build debug APK
        run: |
          cd android
          ./gradlew assembleDebug --no-daemon

      - name: Find built APK
        run: find android -name "*.apk" -type f

      - name: Create release and upload APK
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "debug-${{ needs.check.outputs.tag }}" \
            --title "Debug APK for ${{ needs.check.outputs.tag }}" \
            --notes "Debug build from [prjctimg/learn-p5@${{ needs.check.outputs.tag }}](https://github.com/prjctimg/learn-p5/releases/tag/${{ needs.check.outputs.tag }})" \
            android/**/*.apk \
            --clobber
